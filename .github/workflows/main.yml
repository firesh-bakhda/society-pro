name: Build Society Pro
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: List files in the repository
        run: ls ${{ github.workspace }}

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: ${{ github.workspace }}/.python-version

      - name: Setup uv
        uses: yezz123/setup-uv@v4.1
        with:
          uv-venv: ${{ github.workspace }}/.venv

      - name: UV sync
        run: uv sync

      - name: Build project with nuitka
        run: |
          chmod +x ${{ github.workspace }}/build_nuitka.sh
          ${{ github.workspace }}/build_nuitka.sh

      - name: Github Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        uses: elgohr/Github-Release-Action@v5
        with:
          title: Society-Pro-${{ github.sha }}
          workdir: ${{ github.workspace }}/build/society-pro.dist/
